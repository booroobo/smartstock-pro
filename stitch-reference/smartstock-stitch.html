    <style>
        :root {
            --primary: #0f172a;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        .chart-bar { transition: height 1s ease-out; }
        .map-marker { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: flex;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }
    </style>

                    <table class="w-full text-left">
                        <thead class="bg-surface-container-low">
                            <tr class="text-[10px] text-outline font-bold uppercase">
                                <th class="px-md py-3">Date</th>
                                <th class="px-md py-3">Tx Code</th>
                                <th class="px-md py-3">Product</th>
                                <th class="px-md py-3">Type</th>
                                <th class="px-md py-3 text-right">Qty</th>
                                <th class="px-md py-3">User</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant">
                            {[
                                { date: "Oct 24", time: "14:22", code: "TRX-98231", product: "HyperCore X-12", type: "Stock In", qty: "+1,200", user: "John Doe", color: "green" },
                                { date: "Oct 24", time: "12:05", code: "TRX-98229", product: "Oculus Glass", type: "Stock Out", qty: "-450", user: "Sarah Miller", color: "red" }
                            ].map((tx, i) => (
                                <tr key={i} class="hover:bg-background text-sm">
                                    <td class="px-md py-4">
                                        <div class="font-data-mono">{tx.date}</div>
                                        <div class="text-[10px] text-outline">{tx.time}</div>
                                    </td>
                                    <td class="px-md py-4 font-bold">{tx.code}</td>
                                    <td class="px-md py-4">{tx.product}</td>
                                    <td class="px-md py-4">
                                        <span class={`px-2 py-0.5 rounded text-[10px] font-bold uppercase ${tx.color === 'green' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>{tx.type}</span>
                                    </td>
                                    <td class={`px-md py-4 text-right font-bold ${tx.color === 'green' ? 'text-green-600' : 'text-red-600'}`}>{tx.qty}</td>
                                    <td class="px-md py-4">{tx.user}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const Queue = () => (
            <div class="space-y-lg">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-gutter mb-xl">
                    {[
                        { label: 'QUEUED', val: 14, icon: 'hourglass_empty', bg: 'bg-secondary-fixed' },
                        { label: 'PROCESSING', val: 3, icon: 'sync', bg: 'bg-primary-fixed', animate: true },
                        { label: 'FAILED', val: 2, icon: 'error_outline', bg: 'bg-error-container', color: 'text-error' },
                        { label: 'COMPLETED', val: 1248, icon: 'check_circle', bg: 'bg-green-100', color: 'text-green-700' }
                    ].map((s, i) => (
                        <div key={i} class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant flex items-center gap-4">
                            <div class={`w-12 h-12 rounded-full ${s.bg} flex items-center justify-center`}>
                                <span class={`material-symbols-outlined ${s.animate ? 'animate-spin' : ''}`}>{s.icon}</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-outline uppercase">{s.label}</p>
                                <p class={`text-2xl font-bold ${s.color || ''}`}>{s.val}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const AuditLogs = () => (
            <div class="space-y-lg">
                <div class="bg-white rounded-xl shadow-sm border border-outline-variant overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-surface-container-low text-[10px] text-outline font-bold uppercase">
                            <tr>
                                <th class="px-md py-4">Timestamp</th>
                                <th class="px-md py-4">User</th>
                                <th class="px-md py-4">Action</th>
                                <th class="px-md py-4">Severity</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant">
                            <tr>
                                <td class="px-md py-4 text-xs">2023-10-27 14:32:01</td>
                                <td class="px-md py-4 text-sm">Marcus Thorne</td>
                                <td class="px-md py-4 text-sm">Updated System Firewall</td>
                                <td class="px-md py-4"><span class="bg-error-container text-error px-2 py-0.5 rounded text-[10px] font-bold uppercase">Critical</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const SystemStatus = () => (
            <div class="space-y-lg">
                <div class="grid grid-cols-12 gap-gutter">
                    <div class="col-span-12 lg:col-span-8 bg-white p-lg rounded-xl border border-outline-variant">
                        <h3 class="font-headline-sm mb-lg">Resource Utilization</h3>
                        <div class="space-y-8">
                            {['CPU Usage', 'Memory', 'Disk IOPS', 'Network'].map((m, i) => (
                                <div key={i}>
                                    <div class="flex justify-between mb-2">
                                        <span class="font-bold text-sm">{m}</span>
                                        <span class="font-data-mono text-primary text-xs">{(i+1)*20}%</span>
                                    </div>
                                    <div class="h-4 w-full bg-surface-container rounded-full overflow-hidden">
                                        <div class="h-full bg-primary" style={{width: `${(i+1)*20}%`}}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
                <div class="mt-xl bg-primary-container p-md rounded-xl border border-outline-variant flex items-center gap-lg">
                    <div class="flex-1 overflow-hidden">
                        <div class="animate-marquee flex gap-12 text-on-primary-container font-data-mono text-xs text-white opacity-80">
                            <span>[INFO] 14:22:01 - Garbage collection completed in 42ms.</span>
                            <span>[WARN] 14:21:45 - High latency detected in worker-node-04.</span>
                            <span>[INFO] 14:20:12 - API Key rotation successful.</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        const RoleControl = () => (
            <div class="space-y-xl">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-gutter">
                    {['Admin', 'Manager', 'Staff', 'Viewer'].map((role, i) => (
                        <div key={i} class="bg-white p-lg rounded-xl shadow-sm border border-outline-variant hover:shadow-md transition-all group">
                            <div class="w-10 h-10 bg-primary-container text-on-primary-fixed rounded flex items-center justify-center mb-4">
                                <span class="material-symbols-outlined text-white">shield</span>
                            </div>
                            <h3 class="font-bold mb-2">{role}</h3>
                            <p class="text-xs text-outline mb-4">Granular access control for system modules.</p>
                            <span class="text-xs text-primary font-bold cursor-pointer hover:underline">Edit Role</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- Main App ---

        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<Layout title="Dashboard"><Dashboard /></Layout>} />
                        <Route path="/products" element={<Layout title="Products Inventory"><Products /></Layout>} />
                        <Route path="/warehouses" element={<Layout title="Warehouse Management"><Warehouses /></Layout>} />
                        <Route path="/transactions" element={<Layout title="Transaction History"><Transactions /></Layout>} />
                        <Route path="/queue" element={<Layout title="Queue & Imports"><Queue /></Layout>} />
                        <Route path="/audit-logs" element={<Layout title="Audit Logs"><AuditLogs /></Layout>} />
                        <Route path="/status" element={<Layout title="System Status"><SystemStatus /></Layout>} />
                        <Route path="/roles" element={<Layout title="Role Access Control"><RoleControl /></Layout>} />
                        <Route path="/reports" element={<Layout title="Enterprise Reports">
                            <div class="p-xl bg-white border border-outline-variant rounded-xl text-center">
                                <span class="material-symbols-outlined text-5xl mb-4 text-outline">analytics</span>
                                <h3 class="font-headline-sm">Reporting Engine</h3>
                                <p class="text-outline">Advanced analytics and aggregated data insights dashboard is loading...</p>
                            </div>
                        </Layout>} />
                        <Route path="/settings" element={<Layout title="System Settings">
                            <div class="p-xl bg-white border border-outline-variant rounded-xl text-center">
                                <span class="material-symbols-outlined text-5xl mb-4 text-outline">settings</span>
                                <h3 class="font-headline-sm">Preferences</h3>
                                <p class="text-outline">Global system configuration and user profile settings.</p>
                            </div>
                        </Layout>} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
